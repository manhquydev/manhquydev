<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Catppuccin Latte Colors -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e6e9ef" stop-opacity="0.5"/>
    </linearGradient>
    
    <linearGradient id="border-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e66f5"/>
      <stop offset="100%" stop-color="#04a5e5"/>
    </linearGradient>
    
    <linearGradient id="border-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8839ef"/>
      <stop offset="100%" stop-color="#ea76cb"/>
    </linearGradient>
    
    <linearGradient id="border-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#40a02b"/>
      <stop offset="100%" stop-color="#179299"/>
    </linearGradient>
    
    <linearGradient id="border-4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#df8e1d"/>
      <stop offset="100%" stop-color="#fe640b"/>
    </linearGradient>
    
    <linearGradient id="chart-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e66f5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e66f5" stop-opacity="0.05"/>
    </linearGradient>
    
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e66f5" flood-opacity="0.1"/>
    </filter>
    
    <filter id="glass-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#eff1f5"/>
  
  <!-- Section Title -->
  <text x="60" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#4c4f69">GitHub Stats</text>
  <rect x="60" y="62" width="40" height="3" rx="1.5" fill="#1e66f5"/>
  
  <!-- Card 1: Followers -->
  <g transform="translate(60, 90)">
    <rect x="-4" y="-4" width="268" height="148" rx="18" fill="#dce0e8" opacity="0.4" filter="url(#glass-blur)"/>
    <rect width="260" height="140" rx="16" fill="url(#card-bg)" stroke="#ccd0da" stroke-width="1"/>
    <rect x="0" y="0" width="260" height="4" rx="2" fill="url(#border-1)"/>
    <text x="20" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6c6f85" font-weight="500">Followers</text>
    <text x="20" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#4c4f69">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze"/>
      2
    </text>
    <circle cx="220" cy="75" r="20" fill="#1e66f5" opacity="0.1"/>
    <path d="M212 75c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8" stroke="#1e66f5" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Card 2: Public Repos -->
  <g transform="translate(350, 90)">
    <rect x="-4" y="-4" width="268" height="148" rx="18" fill="#dce0e8" opacity="0.4" filter="url(#glass-blur)"/>
    <rect width="260" height="140" rx="16" fill="url(#card-bg)" stroke="#ccd0da" stroke-width="1"/>
    <rect x="0" y="0" width="260" height="4" rx="2" fill="url(#border-2)"/>
    <text x="20" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6c6f85" font-weight="500">Public Repos</text>
    <text x="20" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#4c4f69">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze"/>
      18
    </text>
    <circle cx="220" cy="75" r="20" fill="#8839ef" opacity="0.1"/>
    <rect x="208" y="65" width="24" height="20" rx="4" stroke="#8839ef" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Card 3: Contributions (30d) -->
  <g transform="translate(640, 90)">
    <rect x="-4" y="-4" width="268" height="148" rx="18" fill="#dce0e8" opacity="0.4" filter="url(#glass-blur)"/>
    <rect width="260" height="140" rx="16" fill="url(#card-bg)" stroke="#ccd0da" stroke-width="1"/>
    <rect x="0" y="0" width="260" height="4" rx="2" fill="url(#border-3)"/>
    <text x="20" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6c6f85" font-weight="500">Contributions (30d)</text>
    <text x="20" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#4c4f69">
      <animate attributeName="opacity" from="0" to="1" dur="0.7s" fill="freeze"/>
      18
    </text>
    <circle cx="220" cy="75" r="20" fill="#40a02b" opacity="0.1"/>
    <path d="M210 75l8-8 8 8m-8 20v-20" stroke="#40a02b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
  
  <!-- Card 4: Contributions (12m) -->
  <g transform="translate(930, 90)">
    <rect x="-4" y="-4" width="268" height="148" rx="18" fill="#dce0e8" opacity="0.4" filter="url(#glass-blur)"/>
    <rect width="260" height="140" rx="16" fill="url(#card-bg)" stroke="#ccd0da" stroke-width="1"/>
    <rect x="0" y="0" width="260" height="4" rx="2" fill="url(#border-4)"/>
    <text x="20" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6c6f85" font-weight="500">Contributions (12m)</text>
    <text x="20" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#4c4f69">
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" fill="freeze"/>
      82
    </text>
    <circle cx="220" cy="75" r="20" fill="#df8e1d" opacity="0.1"/>
    <path d="M210 70h8v10h10v-15h8" stroke="#df8e1d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
  
  <!-- Contribution Chart Area -->
  <g transform="translate(60, 280)">
    <rect x="-8" y="-8" width="776" height="276" rx="20" fill="#dce0e8" opacity="0.4" filter="url(#glass-blur)"/>
    <rect width="760" height="260" rx="16" fill="url(#card-bg)" stroke="#ccd0da" stroke-width="1"/>
    <text x="24" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#4c4f69">Contribution Activity</text>
    
    <!-- Chart placeholder - contribution data will be rendered here -->
    <g transform="translate(24, 70)">
      <!-- Y-axis labels -->
      <text x="0" y="10" font-size="10" fill="#6c6f85">High</text>
      <text x="0" y="75" font-size="10" fill="#6c6f85">Med</text>
      <text x="0" y="140" font-size="10" fill="#6c6f85">Low</text>
      
      <!-- Chart bars placeholder -->
      <g transform="translate(50, 0)">
        <rect x="0" y="60" width="30" height="90" rx="4" fill="#1e66f5" opacity="0.7">
          <animate attributeName="height" from="0" to="90" dur="0.5s" fill="freeze"/>
          <animate attributeName="y" from="150" to="60" dur="0.5s" fill="freeze"/>
        </rect>
        <rect x="40" y="40" width="30" height="110" rx="4" fill="#1e66f5" opacity="0.8">
          <animate attributeName="height" from="0" to="110" dur="0.6s" fill="freeze"/>
          <animate attributeName="y" from="150" to="40" dur="0.6s" fill="freeze"/>
        </rect>
        <rect x="80" y="80" width="30" height="70" rx="4" fill="#1e66f5" opacity="0.6">
          <animate attributeName="height" from="0" to="70" dur="0.7s" fill="freeze"/>
          <animate attributeName="y" from="150" to="80" dur="0.7s" fill="freeze"/>
        </rect>
        <rect x="120" y="20" width="30" height="130" rx="4" fill="#1e66f5" opacity="0.9">
          <animate attributeName="height" from="0" to="130" dur="0.8s" fill="freeze"/>
          <animate attributeName="y" from="150" to="20" dur="0.8s" fill="freeze"/>
        </rect>
        <rect x="160" y="50" width="30" height="100" rx="4" fill="#1e66f5" opacity="0.75">
          <animate attributeName="height" from="0" to="100" dur="0.9s" fill="freeze"/>
          <animate attributeName="y" from="150" to="50" dur="0.9s" fill="freeze"/>
        </rect>
        <rect x="200" y="70" width="30" height="80" rx="4" fill="#1e66f5" opacity="0.65">
          <animate attributeName="height" from="0" to="80" dur="1s" fill="freeze"/>
          <animate attributeName="y" from="150" to="70" dur="1s" fill="freeze"/>
        </rect>
        <rect x="240" y="30" width="30" height="120" rx="4" fill="#1e66f5" opacity="0.85">
          <animate attributeName="height" from="0" to="120" dur="1.1s" fill="freeze"/>
          <animate attributeName="y" from="150" to="30" dur="1.1s" fill="freeze"/>
        </rect>
        <rect x="280" y="90" width="30" height="60" rx="4" fill="#1e66f5" opacity="0.5">
          <animate attributeName="height" from="0" to="60" dur="1.2s" fill="freeze"/>
          <animate attributeName="y" from="150" to="90" dur="1.2s" fill="freeze"/>
        </rect>
        <rect x="320" y="45" width="30" height="105" rx="4" fill="#1e66f5" opacity="0.78">
          <animate attributeName="height" from="0" to="105" dur="1.3s" fill="freeze"/>
          <animate attributeName="y" from="150" to="45" dur="1.3s" fill="freeze"/>
        </rect>
        <rect x="360" y="55" width="30" height="95" rx="4" fill="#1e66f5" opacity="0.72">
          <animate attributeName="height" from="0" to="95" dur="1.4s" fill="freeze"/>
          <animate attributeName="y" from="150" to="55" dur="1.4s" fill="freeze"/>
        </rect>
        <rect x="400" y="35" width="30" height="115" rx="4" fill="#1e66f5" opacity="0.82">
          <animate attributeName="height" from="0" to="115" dur="1.5s" fill="freeze"/>
          <animate attributeName="y" from="150" to="35" dur="1.5s" fill="freeze"/>
        </rect>
        <rect x="440" y="75" width="30" height="75" rx="4" fill="#1e66f5" opacity="0.68">
          <animate attributeName="height" from="0" to="75" dur="1.6s" fill="freeze"/>
          <animate attributeName="y" from="150" to="75" dur="1.6s" fill="freeze"/>
        </rect>
        <!-- X-axis line -->
        <line x1="-10" y1="150" x2="490" y2="150" stroke="#ccd0da" stroke-width="1"/>
      </g>
    </g>
    
    <!-- Chart placeholder text -->
    <text x="380" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#9ca0b0" text-anchor="middle">
      82 contributions — Last 12 months activity
    </text>
  </g>
  
  <!-- Languages Chart Area -->
  <g transform="translate(850, 280)">
    <rect x="-8" y="-8" width="308" height="276" rx="20" fill="#dce0e8" opacity="0.4" filter="url(#glass-blur)"/>
    <rect width="290" height="260" rx="16" fill="url(#card-bg)" stroke="#ccd0da" stroke-width="1"/>
    <text x="24" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#4c4f69">Top Languages</text>
    
    <!-- Donut chart placeholder -->
    <g transform="translate(145, 140)">
      <circle r="60" fill="none" stroke="#e6e9ef" stroke-width="20"/>
      <circle r="60" fill="none" stroke="#1e66f5" stroke-width="20" stroke-dasharray="94 283" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90)">
        <animate attributeName="stroke-dasharray" from="0 377" to="94 283" dur="1s" fill="freeze"/>
      </circle>
      <circle r="60" fill="none" stroke="#8839ef" stroke-width="20" stroke-dasharray="75 283" stroke-dashoffset="-94" stroke-linecap="round" transform="rotate(-90)">
        <animate attributeName="stroke-dasharray" from="0 377" to="75 283" dur="1.2s" fill="freeze"/>
      </circle>
      <circle r="60" fill="none" stroke="#40a02b" stroke-width="20" stroke-dasharray="57 283" stroke-dashoffset="-169" stroke-linecap="round" transform="rotate(-90)">
        <animate attributeName="stroke-dasharray" from="0 377" to="57 283" dur="1.4s" fill="freeze"/>
      </circle>
      <circle r="60" fill="none" stroke="#df8e1d" stroke-width="20" stroke-dasharray="38 283" stroke-dashoffset="-226" stroke-linecap="round" transform="rotate(-90)">
        <animate attributeName="stroke-dasharray" from="0 377" to="38 283" dur="1.6s" fill="freeze"/>
      </circle>
      <text y="5" font-size="14" font-weight="700" fill="#4c4f69" text-anchor="middle">
        4
      </text>
      <text y="20" font-size="10" fill="#6c6f85" text-anchor="middle">languages</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(24, 220)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#1e66f5"/>
      <text x="18" y="9" font-size="11" fill="#4c4f69">TypeScript</text>
      <rect x="90" y="0" width="10" height="10" rx="2" fill="#8839ef"/>
      <text x="108" y="9" font-size="11" fill="#4c4f69">JavaScript</text>
    </g>
    <g transform="translate(24, 240)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#40a02b"/>
      <text x="18" y="9" font-size="11" fill="#4c4f69">Python</text>
      <rect x="90" y="0" width="10" height="10" rx="2" fill="#df8e1d"/>
      <text x="108" y="9" font-size="11" fill="#4c4f69">Other</text>
    </g>
  </g>
</svg>
