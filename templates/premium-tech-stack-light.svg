<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Catppuccin Latte Colors -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e6e9ef" stop-opacity="0.4"/>
    </linearGradient>
    
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e66f5"/>
      <stop offset="50%" stop-color="#8839ef"/>
      <stop offset="100%" stop-color="#04a5e5"/>
    </linearGradient>
    
    <filter id="glass-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="200" fill="#eff1f5"/>
  
  <!-- Section Title -->
  <text x="60" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#4c4f69">Tech Stack</text>
  <rect x="60" y="57" width="40" height="3" rx="1.5" fill="url(#accent-line)"/>
  
  <!-- Glass container -->
  <g transform="translate(60, 85)">
    <rect x="-8" y="-8" width="1096" height="96" rx="20" fill="#dce0e8" opacity="0.4" filter="url(#glass-blur)"/>
    <rect width="1080" height="80" rx="16" fill="url(#card-bg)" stroke="#ccd0da" stroke-width="1"/>
    <rect x="12" y="8" width="1056" height="2" rx="1" fill="#ffffff" opacity="0.6"/>
    
    <!-- Tech Icons Grid -->
    <g transform="translate(40, 20)">
      <!-- JavaScript -->
      <g transform="translate(0, 0)">
        <rect width="120" height="40" rx="20" fill="#df8e1d" opacity="0.15"/>
        <text x="60" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#df8e1d" text-anchor="middle" font-weight="600">JavaScript</text>
        <circle cx="15" cy="20" r="6" fill="#df8e1d" opacity="0.4"/>
      </g>
      
      <!-- TypeScript -->
      <g transform="translate(135, 0)">
        <rect width="120" height="40" rx="20" fill="#1e66f5" opacity="0.15"/>
        <text x="60" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#1e66f5" text-anchor="middle" font-weight="600">TypeScript</text>
        <circle cx="15" cy="20" r="6" fill="#1e66f5" opacity="0.4"/>
      </g>
      
      <!-- React -->
      <g transform="translate(270, 0)">
        <rect width="90" height="40" rx="20" fill="#04a5e5" opacity="0.15"/>
        <text x="45" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#04a5e5" text-anchor="middle" font-weight="600">React</text>
        <circle cx="15" cy="20" r="6" fill="#04a5e5" opacity="0.4"/>
      </g>
      
      <!-- Node.js -->
      <g transform="translate(375, 0)">
        <rect width="100" height="40" rx="20" fill="#40a02b" opacity="0.15"/>
        <text x="50" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#40a02b" text-anchor="middle" font-weight="600">Node.js</text>
        <circle cx="15" cy="20" r="6" fill="#40a02b" opacity="0.4"/>
      </g>
      
      <!-- MongoDB -->
      <g transform="translate(490, 0)">
        <rect width="100" height="40" rx="20" fill="#40a02b" opacity="0.15"/>
        <text x="50" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#40a02b" text-anchor="middle" font-weight="600">MongoDB</text>
        <circle cx="15" cy="20" r="6" fill="#40a02b" opacity="0.4"/>
      </g>
      
      <!-- PostgreSQL -->
      <g transform="translate(605, 0)">
        <rect width="110" height="40" rx="20" fill="#1e66f5" opacity="0.15"/>
        <text x="55" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#1e66f5" text-anchor="middle" font-weight="600">PostgreSQL</text>
        <circle cx="15" cy="20" r="6" fill="#1e66f5" opacity="0.4"/>
      </g>
      
      <!-- Docker -->
      <g transform="translate(730, 0)">
        <rect width="90" height="40" rx="20" fill="#1e66f5" opacity="0.15"/>
        <text x="45" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#1e66f5" text-anchor="middle" font-weight="600">Docker</text>
        <circle cx="15" cy="20" r="6" fill="#1e66f5" opacity="0.4"/>
      </g>
      
      <!-- AWS -->
      <g transform="translate(835, 0)">
        <rect width="70" height="40" rx="20" fill="#fe640b" opacity="0.15"/>
        <text x="35" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#fe640b" text-anchor="middle" font-weight="600">AWS</text>
        <circle cx="15" cy="20" r="6" fill="#fe640b" opacity="0.4"/>
      </g>
      
      <!-- Git -->
      <g transform="translate(920, 0)">
        <rect width="70" height="40" rx="20" fill="#fe640b" opacity="0.15"/>
        <text x="35" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#fe640b" text-anchor="middle" font-weight="600">Git</text>
        <circle cx="15" cy="20" r="6" fill="#fe640b" opacity="0.4"/>
      </g>
    </g>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="60" y="185" width="1080" height="2" rx="1" fill="url(#accent-line)" opacity="0.5"/>
</svg>
