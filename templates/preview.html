<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium SVG Templates Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #313244 100%);
            min-height: 100vh;
            padding: 40px;
        }
        .section {
            margin-bottom: 40px;
            max-width: 1240px;
            margin-left: auto;
            margin-right: auto;
        }
        .section-title {
            color: #cdd6f4;
            font-size: 18px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .template-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .template-card {
            background: rgba(49, 50, 68, 0.5);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(69, 71, 90, 0.5);
        }
        .template-label {
            color: #a6adc8;
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        svg {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .light-bg {
            background: #eff1f5;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="section">
        <div class="section-title">1. Premium Hero Templates</div>
        <div class="template-row">
            <div class="template-card">
                <div class="template-label">Light</div>
                <div class="light-bg">
                    <img src="../templates/premium-hero-light.svg" width="600" alt="Hero Light">
                </div>
            </div>
            <div class="template-card">
                <div class="template-label">Dark</div>
                <img src="../templates/premium-hero-dark.svg" width="600" alt="Hero Dark">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">2. Premium Stats Dashboard Templates</div>
        <div class="template-row">
            <div class="template-card">
                <div class="template-label">Light</div>
                <div class="light-bg">
                    <img src="../templates/premium-stats-dashboard-light.svg" width="600" alt="Stats Light">
                </div>
            </div>
            <div class="template-card">
                <div class="template-label">Dark</div>
                <img src="../templates/premium-stats-dashboard-dark.svg" width="600" alt="Stats Dark">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">3. Premium Work Focus Templates</div>
        <div class="template-row">
            <div class="template-card">
                <div class="template-label">Light</div>
                <div class="light-bg">
                    <img src="../templates/premium-work-focus-light.svg" width="600" alt="Work Focus Light">
                </div>
            </div>
            <div class="template-card">
                <div class="template-label">Dark</div>
                <img src="../templates/premium-work-focus-dark.svg" width="600" alt="Work Focus Dark">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">4. Premium Tech Stack Templates</div>
        <div class="template-row">
            <div class="template-card">
                <div class="template-label">Light</div>
                <div class="light-bg">
                    <img src="../templates/premium-tech-stack-light.svg" width="600" alt="Tech Stack Light">
                </div>
            </div>
            <div class="template-card">
                <div class="template-label">Dark</div>
                <img src="../templates/premium-tech-stack-dark.svg" width="600" alt="Tech Stack Dark">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">5. Premium Contact Templates</div>
        <div class="template-row">
            <div class="template-card">
                <div class="template-label">Light</div>
                <div class="light-bg">
                    <img src="../templates/premium-contact-light.svg" width="600" alt="Contact Light">
                </div>
            </div>
            <div class="template-card">
                <div class="template-label">Dark</div>
                <img src="../templates/premium-contact-dark.svg" width="600" alt="Contact Dark">
            </div>
        </div>
    </div>
</body>
</html>
