name: Update GitHub Data

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 03:00 UTC
  workflow_dispatch:      # Manual trigger for testing

jobs:
  update-github-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch GitHub account and contribution metrics
        run: node scripts/fetch-github-metrics.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch project statistics
        run: node scripts/fetch-project-stats.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README with GitHub data
        run: node scripts/update-readme.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet README.md assets/readme/github-dashboard-light.svg assets/readme/github-dashboard-dark.svg || (git add README.md assets/readme/github-dashboard-light.svg assets/readme/github-dashboard-dark.svg && git commit -m "docs: update github data [skip ci]" && git push)
